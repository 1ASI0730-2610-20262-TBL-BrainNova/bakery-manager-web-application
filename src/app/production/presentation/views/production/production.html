<section class="production-view">
  <header class="view-header">
    <div>
      <div class="eyebrow">BakeryManager · {{ 'production.title' | translate }}</div>
      <h1>{{ 'production.heading' | translate }}</h1>
    </div>
  </header>

  <app-production-summary />

  @if (error()) {
    <div class="error-banner">{{ error() }}</div>
  }

  <div class="batch-list">
    @for (batch of batches(); track batch.id) {
      <app-batch-card [batch]="batch" />
    } @empty {
      <p class="empty">{{ 'production.empty' | translate }}</p>
    }
  </div>
</section>
