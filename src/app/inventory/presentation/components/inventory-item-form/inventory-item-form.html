<section class="form-container">
  <h2 class="form-title">Registrar Nuevo Insumo</h2>

  <form [formGroup]="inventoryForm" (ngSubmit)="onSubmit()" class="inventory-form">

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nombre del Insumo</mat-label>
      <input matInput formControlName="name" placeholder="Ej. Harina de Trigo">
      <mat-error *ngIf="inventoryForm.get('name')?.hasError('required')">
        El nombre es obligatorio.
      </mat-error>
      <mat-error *ngIf="inventoryForm.get('name')?.hasError('minlength')">
        Debe tener al menos 3 caracteres.
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Descripción</mat-label>
      <textarea matInput formControlName="description" placeholder="Detalles adicionales..."></textarea>
    </mat-form-field>

    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Stock Inicial</mat-label>
        <input matInput type="number" formControlName="quantity">
        <mat-error *ngIf="inventoryForm.get('quantity')?.hasError('min')">
          No puede ser menor a 0.
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Unidad de Medida</mat-label>
        <mat-select formControlName="unit">
          <mat-option *ngFor="let unit of unitOptions" [value]="unit">
            {{ unit }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Stock Mínimo para Alerta</mat-label>
      <input matInput type="number" formControlName="minStock">
      <mat-hint>Se notificará cuando el stock sea igual o menor a este valor.</mat-hint>
      <mat-error *ngIf="inventoryForm.get('minStock')?.hasError('min')">
        No puede ser menor a 0.
      </mat-error>
    </mat-form-field>

    <div class="actions">
      <button mat-raised-button color="primary" type="submit" [disabled]="inventoryForm.invalid">
        Agregar al Inventario
      </button>
    </div>

  </form>
</section>
