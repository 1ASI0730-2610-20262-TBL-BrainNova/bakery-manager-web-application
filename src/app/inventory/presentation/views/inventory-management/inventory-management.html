<div class="inventory-container">
  <header class="inventory-header">
    <h1>{{ 'inventory.title' | translate }}</h1>
  </header>

  <main class="inventory-layout">
    <section class="form-section">
      <app-inventory-item-form></app-inventory-item-form>
    </section>

    <div class="spacer"></div>

    <section class="list-section">
      <app-inventory-item-list [dataSource]="inventoryItems"></app-inventory-item-list>
    </section>
  </main>
</div>
